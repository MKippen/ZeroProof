services:
  nginx:
    image: nginx:alpine
    container_name: zeroproof-nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/ssl/private:ro
      - frontend_build:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "app=zeroproof"
      - "component=proxy"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: zeroproof-frontend
    environment:
      - VITE_API_URL=/api/v1
      - VITE_WS_URL=/ws
    volumes:
      - frontend_build:/app/dist
    restart: unless-stopped
    labels:
      - "app=zeroproof"
      - "component=frontend"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: zeroproof-backend
    volumes:
      - ./backend/firmware:/app/firmware:ro
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/zeroproof
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_USERNAME=${MQTT_USERNAME:-auditor}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "app=zeroproof"
      - "component=backend"

  postgres:
    image: postgres:15-alpine
    container_name: zeroproof-postgres
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=zeroproof
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "app=zeroproof"
      - "component=database"

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: zeroproof-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    labels:
      - "app=zeroproof"
      - "component=mqtt"

  scheduler:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: zeroproof-scheduler
    command: node dist/scheduler.js
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/zeroproof
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_USERNAME=${MQTT_USERNAME:-auditor}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped
    labels:
      - "app=zeroproof"
      - "component=scheduler"

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
  frontend_build:
