#
# ZeroProof is a network security tool — backend and scheduler need to see
# the *host's* LAN to auto-discover the UniFi gateway and DNS proxy from
# DHCP-advertised sources. We run those services (and the public-facing
# nginx) on the host network namespace so they see the real default
# gateway and resolv.conf, not the Docker bridge equivalents.
#
# Stateful services (postgres, mosquitto) and the frontend SPA stay on the
# default bridge network. Backend reaches them via 127.0.0.1:<port> because
# their published ports are on the host. We bind those ports to 127.0.0.1
# only so they aren't exposed to the LAN — except mosquitto, which has to
# accept ESP32 sensor connections from elsewhere on the network.
#
# This pattern is standard for self-hosted security/network tools (Pi-hole,
# AdGuard, Tailscale all do similar). It only works on Linux: Docker
# Desktop on Mac/Windows uses a hidden VM, so "host" means the VM not
# macOS/Windows. Production targets here are Linux (LXC, VPS, Pi); dev on
# Mac uses docker-compose.dev.yml which keeps bridge networking.
#
services:
  nginx:
    image: nginx:alpine
    container_name: zeroproof-nginx
    network_mode: host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/ssl/private:ro
    # Map-syntax `depends_on` so nginx waits for frontend + backend to be
    # *healthy*, not merely created. On `docker compose up -d` during an
    # in-place upgrade, short-syntax depends_on let nginx start proxying
    # to a frontend whose new bundle wasn't actually being served yet
    # (May 2026 LXC incident — users saw a "Welcome back" page with no
    # script tag because nginx forwarded to a half-recreated frontend).
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "app=zeroproof"
      - "component=proxy"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: zeroproof-frontend
    ports:
      # Loopback-only — only the host's nginx (running on host net) needs
      # to reach this. Not exposed to the LAN.
      - "127.0.0.1:8080:80"
    environment:
      - VITE_API_URL=/api/v1
      - VITE_WS_URL=/ws
    restart: unless-stopped
    # "Healthy" means the on-disk index.html that nginx serves actually
    # contains a script tag. A bare 200 from nginx isn't enough — during
    # the May 2026 incident the container responded 200 with an index.html
    # missing its bundle reference, and the host nginx happily proxied
    # that to users.
    #
    # We grep the file on disk (which nginx serves verbatim) instead of
    # piping `wget -qO-` through grep — busybox wget on nginx:alpine
    # mishandles bundled short options and silently produces no body.
    healthcheck:
      test: ["CMD-SHELL", "grep -q '<script' /usr/share/nginx/html/index.html"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "app=zeroproof"
      - "component=frontend"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: zeroproof-backend
    network_mode: host
    volumes:
      - ./backend/firmware:/app/firmware:ro
      - ./rules:/rules:ro
      # Read-only access to the updater's progress files so the apply route
      # can tail them and forward to WebSocket clients.
      - zeroproof_updater_progress:/var/run/zeroproof:ro
    environment:
      # Backend is on the host network namespace, so it reaches stateful
      # services via the host's loopback rather than docker-bridge service
      # names. Postgres binds 127.0.0.1:5432, Mosquitto binds 1883 publicly.
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@localhost:5432/zeroproof
      - MQTT_BROKER=localhost
      - MQTT_PORT=1883
      - MQTT_USERNAME=${MQTT_USERNAME:-auditor}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-}
      - RULES_DIR=/rules
      - PORT=3000
      # Updater integration — backend signs apply requests with this secret
      # and POSTs to the local updater sidecar. Blank disables in-app updates.
      - UPDATER_SECRET=${UPDATER_SECRET:-}
      - UPDATER_URL=http://127.0.0.1:9090
      - UPDATER_PROGRESS_DIR=/var/run/zeroproof
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "app=zeroproof"
      - "component=backend"

  postgres:
    image: postgres:15-alpine
    container_name: zeroproof-postgres
    ports:
      # Loopback-only — only host-networked services (backend, scheduler)
      # need to reach this. Not exposed to the LAN.
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=zeroproof
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      # On recreate, postgres needs ~5-10s for initdb / WAL recovery
      # before pg_isready returns 0. Without start_period, the first few
      # probes count as failures and unnecessarily delay backend startup.
      start_period: 20s
    labels:
      - "app=zeroproof"
      - "component=database"

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: zeroproof-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    labels:
      - "app=zeroproof"
      - "component=mqtt"

  updater:
    # Privileged sidecar that orchestrates self-upgrades. Receives
    # HMAC-signed apply requests from the backend on 127.0.0.1:9090,
    # shells to scripts/upgrade.sh in the mounted worktree. Trust
    # boundary is the Docker socket — keep the image surface area minimal.
    #
    # Known limitation in v1.1.5: when an upgrade includes a new updater
    # image, the updater container itself gets recreated and the
    # in-progress apply may be interrupted. Backend reconnects to the
    # progress file via the shared volume so the UI still shows final
    # state, and CLI scripts/upgrade.sh remains the unconditional
    # fallback. Self-update of the updater (throwaway pattern) is queued
    # for v1.1.6.
    build:
      context: .
      dockerfile: updater/Dockerfile
    container_name: zeroproof-updater
    network_mode: host
    # Mount the host worktree at the SAME absolute path inside the
    # container. When upgrade.sh runs from in here and invokes `docker
    # compose up`, compose resolves `./nginx/nginx.conf` etc. relative
    # to its own working dir. Whatever path it produces is then sent to
    # the docker daemon AS A HOST PATH. If the inside-container path
    # doesn't match the host path, the daemon either auto-creates an
    # empty dir at a bogus host location (silently breaking rules/
    # firmware mounts) or errors out with "not a directory" when the
    # target is a file (nginx.conf, mosquitto.conf). Mounting at the
    # same path on both sides makes the resolution trivially correct.
    # HOST_WORKTREE is set by install.sh to the install dir (default
    # /opt/zeroproof); upgrade.sh backfills it on existing installs.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_WORKTREE:-/opt/zeroproof}:${HOST_WORKTREE:-/opt/zeroproof}
      - zeroproof_updater_progress:/var/run/zeroproof
    working_dir: ${HOST_WORKTREE:-/opt/zeroproof}
    environment:
      - UPDATER_SECRET=${UPDATER_SECRET:-}
      - UPDATER_PORT=9090
      - UPDATER_HOST=127.0.0.1
      - UPDATER_PROGRESS_DIR=/var/run/zeroproof
      - UPDATER_WORKTREE=${HOST_WORKTREE:-/opt/zeroproof}
      - UPDATER_HEALTH_URL=http://127.0.0.1:3000/health
    restart: unless-stopped
    labels:
      - "app=zeroproof"
      - "component=updater"

  scheduler:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: zeroproof-scheduler
    network_mode: host
    command: node dist/scheduler.js
    volumes:
      - ./rules:/rules:ro
    environment:
      # Same host-network reasoning as backend: scheduler runs sync jobs
      # against UniFi/AdGuard on the LAN, so it needs to see the host's
      # routing table and resolvers, not the Docker bridge.
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@localhost:5432/zeroproof
      - MQTT_BROKER=localhost
      - MQTT_PORT=1883
      - MQTT_USERNAME=${MQTT_USERNAME:-auditor}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - RULES_DIR=/rules
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped
    labels:
      - "app=zeroproof"
      - "component=scheduler"

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
  # Shared progress log between updater and backend. Backend tails files
  # in this volume and forwards lines over WebSocket to the UI.
  zeroproof_updater_progress:
