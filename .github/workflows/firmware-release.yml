name: Firmware Release

on:
  push:
    tags:
      - 'firmware-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Firmware release tag to publish, for example firmware-v3.1.0'
        required: true
        default: 'firmware-v0.0.0-manual'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish ESP32 firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('esp32-firmware/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Resolve firmware version
        id: version
        env:
          REQUESTED_TAG: ${{ github.event.inputs.tag || '' }}
        run: |
          set -euo pipefail

          TAG_NAME="${REQUESTED_TAG:-${GITHUB_REF_NAME}}"
          if [[ "${TAG_NAME}" != firmware-v* ]]; then
            echo "::error::Firmware release tags must start with firmware-v"
            exit 1
          fi

          VERSION="${TAG_NAME#firmware-v}"
          if [[ -z "${VERSION}" || "${VERSION}" == "${TAG_NAME}" ]]; then
            echo "::error::Could not extract firmware version from ${TAG_NAME}"
            exit 1
          fi

          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build firmware
        working-directory: ./esp32-firmware
        run: pio run -e esp32dev

      - name: Merge firmware image
        working-directory: ./esp32-firmware/.pio/build/esp32dev
        run: |
          esptool.py --chip esp32 merge_bin \
            -o "${GITHUB_WORKSPACE}/zeroproof-esp32.bin" \
            0x1000 bootloader.bin \
            0x8000 partitions.bin \
            0x10000 firmware.bin

      - name: Generate firmware metadata
        id: metadata
        env:
          FIRMWARE_VERSION: ${{ steps.version.outputs.version }}
          FIRMWARE_TAG: ${{ steps.version.outputs.tag_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import datetime
          import hashlib
          import json
          import os
          from pathlib import Path

          firmware_path = Path("zeroproof-esp32.bin")
          firmware = firmware_path.read_bytes()
          checksum = hashlib.sha256(firmware).hexdigest()
          tag_name = os.environ["FIRMWARE_TAG"]

          metadata = {
              "version": os.environ["FIRMWARE_VERSION"],
              "filename": firmware_path.name,
              "size": len(firmware),
              "checksum": checksum,
              "releaseDate": datetime.datetime.now(datetime.timezone.utc).date().isoformat(),
              "minHardwareVersion": "1.0",
              "notes": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/tag/{tag_name}",
          }

          Path("firmware.json").write_text(json.dumps(metadata, indent=2) + "\n", encoding="utf-8")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"checksum={checksum}\n")
              output.write(f"size={len(firmware)}\n")
          PY

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ESP32 Firmware ${{ steps.version.outputs.version }}
          body: |
            ZeroProof ESP32 firmware release.

            SHA-256: `${{ steps.metadata.outputs.checksum }}`
          files: |
            zeroproof-esp32.bin
            firmware.json
          fail_on_unmatched_files: true
