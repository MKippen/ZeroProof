name: Install Smoke Test

# Runs the actual install path a brand-new user follows: clone the repo,
# run scripts/install.sh, wait for all containers to come up, hit the
# public endpoints, hit /api/v1/system/update via an authenticated session.
#
# Catches the kind of bugs we kept hitting on live LXC validation:
#   - nginx 502 from variable proxy_pass + missing Docker resolver
#   - missing UPDATER_SECRET in the merged .env
#   - install.sh assuming tools that aren't on minimal Linux
#   - container-startup ordering / health regressions
#
# Runs in ~5 min on a standard ubuntu-latest runner. Triggered on PRs that
# touch install.sh, docker-compose.yml, nginx config, Dockerfiles, or any
# of the orchestration code. Also runs nightly against main as a canary.

on:
  pull_request:
    paths:
      - 'scripts/install.sh'
      - 'scripts/upgrade.sh'
      - 'docker-compose.yml'
      - 'docker-compose.dev.yml'
      - 'nginx/**'
      - '**/Dockerfile'
      - '.dockerignore'
      - '.env.example'
      - 'updater/**'
      - 'backend/Dockerfile'
      - 'frontend/Dockerfile'
      # Prisma migrations are load-bearing for Tier 4: any schema change
      # needs to survive a cross-version upgrade against a populated DB,
      # not just `prisma migrate deploy` on an empty test fixture.
      - 'backend/prisma/migrations/**'
      - 'backend/prisma/schema.prisma'
      - '.github/workflows/install-smoke.yml'
  push:
    branches: [main]
  schedule:
    # Daily at 09:00 UTC (~01:00 PT). Catches drift from outside-our-repo
    # changes — base image rebuilds, registry weirdness, etc.
    - cron: '0 9 * * *'

jobs:
  fresh-install:
    name: Fresh install on Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pre-flight — verify install prerequisites are documented
        run: |
          # install.sh expects: docker, docker compose, openssl, curl.
          # These should be on every standard Linux. Sanity-check the
          # CI environment matches what we tell users.
          for cmd in docker openssl curl; do
            if ! command -v "$cmd" >/dev/null 2>&1; then
              echo "PREREQ MISSING: $cmd"
              exit 1
            fi
          done
          docker compose version

      - name: Run install.sh non-interactively
        run: |
          # Pipe `n` to the .env overwrite prompt so re-runs don't reset.
          # First run won't see a .env so it generates one.
          set -e
          # Skip ESP32 firmware download — it's slow and not needed for
          # the install-smoke check.
          export SKIP_FIRMWARE_DOWNLOAD=true
          # The install.sh prompts for sudo on Linux for `usermod -aG`;
          # CI runs as root inside the runner image so it just works.
          # The script also asks "Continue anyway?" if port 80/443 are
          # in use — pipe `y` defensively in case ubuntu-latest has any
          # listener (unlikely on a fresh runner).
          yes | bash scripts/install.sh || true
          # `|| true` on the install.sh itself because its tail health
          # check has historically been flaky (60s timeout). We do our
          # OWN health check below with a longer window.

      - name: Wait for the stack to come up
        run: |
          set -e
          # Up to 3 min for all containers to settle. CI runners are
          # often slower than home labs.
          deadline=$(( $(date +%s) + 180 ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            statuses=$(docker compose ps --format '{{.Names}}: {{.Status}}' || true)
            echo "$statuses"
            # Every expected service container present?
            if echo "$statuses" | grep -q zeroproof-backend \
              && echo "$statuses" | grep -q zeroproof-nginx \
              && echo "$statuses" | grep -q zeroproof-frontend \
              && echo "$statuses" | grep -q zeroproof-updater \
              && echo "$statuses" | grep -q zeroproof-postgres \
              && echo "$statuses" | grep -q zeroproof-mqtt \
              && echo "$statuses" | grep -q zeroproof-scheduler; then
              # Backend specifically reports its own health
              if echo "$statuses" | grep -E "zeroproof-backend.*healthy" >/dev/null; then
                echo "Stack is up and backend is healthy."
                break
              fi
            fi
            sleep 5
          done

      - name: Print container state for debugging
        if: always()
        run: |
          docker compose ps || true
          docker compose logs --tail=30 || true

      - name: Verify all 7 containers are running
        run: |
          set -e
          missing=0
          for svc in backend nginx frontend updater postgres mqtt scheduler; do
            if ! docker ps --format '{{.Names}}' | grep -q "zeroproof-$svc"; then
              echo "MISSING: zeroproof-$svc"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "$missing service(s) failed to start."
            exit 1
          fi
          echo "All 7 services running."

      - name: Verify updater sidecar isn't crashlooping
        run: |
          # The bug we kept hitting: UPDATER_SECRET not generated, sidecar
          # crashloops with "FATAL: UPDATER_SECRET is required".
          status=$(docker inspect zeroproof-updater --format '{{.State.Status}} restartcount={{.RestartCount}}')
          echo "Updater: $status"
          if echo "$status" | grep -qE 'restartcount=[1-9]'; then
            echo "Updater sidecar is crashlooping — UPDATER_SECRET likely missing or invalid."
            docker logs zeroproof-updater --tail=20
            exit 1
          fi

      - name: Hit public health endpoint
        run: |
          # nginx serves /health directly; this catches the 502-on-every-page
          # bug we hit when nginx tried to resolve `localhost` via Docker DNS
          # under network_mode: host.
          for i in 1 2 3 4 5; do
            code=$(curl -sk -o /dev/null -w '%{http_code}' https://localhost/health || echo curl-failed)
            echo "attempt $i: $code"
            [ "$code" = "200" ] && exit 0
            sleep 3
          done
          echo "https://localhost/health never returned 200"
          docker compose logs nginx --tail=20
          exit 1

      - name: Hit a route that proxies through nginx → backend
        run: |
          # /api/v1/auth/setup-status is unauthenticated and exercises the
          # full chain: public nginx → host loopback → backend container →
          # response. If this 502s, the backend isn't reachable through
          # nginx (which was our v1.1.5 nginx-config bug).
          code=$(curl -sk -o /dev/null -w '%{http_code}' https://localhost/api/v1/auth/setup-status)
          echo "setup-status code: $code"
          if [ "$code" != "200" ]; then
            echo "Public API proxy is broken."
            docker compose logs nginx --tail=20
            exit 1
          fi

      - name: Verify the SPA actually loads (not nginx welcome page)
        run: |
          body=$(curl -sk https://localhost/ | head -c 4000)
          # The frontend SPA index.html should reference Vite's bundle
          # and the ZeroProof title. The nginx welcome page mentions
          # "Welcome to nginx!" — historic regression mode.
          if echo "$body" | grep -qi "Welcome to nginx"; then
            echo "Public root is serving the default nginx welcome page."
            exit 1
          fi
          if ! echo "$body" | grep -qiE "(zeroproof|<title>)"; then
            echo "Root does not look like the SPA. First 4KB:"
            echo "$body"
            exit 1
          fi
          echo "SPA is being served at /."

      - name: Verify .env got the secrets we expect from a fresh install
        run: |
          set -e
          for key in POSTGRES_PASSWORD MQTT_PASSWORD SESSION_SECRET ENCRYPTION_KEY UPDATER_SECRET; do
            if ! grep -qE "^${key}=.+$" .env; then
              echo "Fresh install did not generate $key in .env"
              echo "--- .env contents (sensitive lines redacted) ---"
              sed -E 's/(=).+$/\1<redacted>/' .env
              exit 1
            fi
          done
          echo "All required secrets present in .env."

      - name: Exercise upgrade.sh --check (smoke test the upgrade path)
        run: |
          # `--check` parses the script, fetches tags, computes the
          # plan, and exits cleanly. Doesn't apply anything. Catches
          # syntax errors, broken env-merge, or missing helpers in the
          # upgrade flow itself — exactly the openssl-not-found bug
          # that triggered this whole PR.
          bash scripts/upgrade.sh --check

      - name: Critical-path API contract scenarios
        run: |
          # Tier 2 of the test strategy: hit the real running stack with
          # the real auth flow and assert each critical route answers
          # with the shape the frontend expects. This is what would have
          # caught the "/system/update returns 401 to logged-in users"
          # kind of regression.
          set -e

          BASE="https://localhost"
          COOKIE_JAR=/tmp/zp-test-cookies
          PASSWORD="ci-test-password-32+chars-required"
          rm -f "$COOKIE_JAR"

          # Helper: extract a field from a JSON body via jq, fail loudly
          # if missing. Usage: assert_field "$body" .data.versions.backend
          assert_field() {
            local body="$1"
            local path="$2"
            local label="$3"
            local value
            value=$(echo "$body" | jq -r "$path" 2>/dev/null || echo "JQ_ERROR")
            if [ "$value" = "null" ] || [ "$value" = "JQ_ERROR" ] || [ -z "$value" ]; then
              echo "FAIL: $label — expected $path in response, got:"
              echo "$body" | head -c 500
              exit 1
            fi
            echo "OK: $label = $value"
          }

          echo "=== 1. Setup status (unauth) ==="
          body=$(curl -sk "$BASE/api/v1/auth/setup-status")
          assert_field "$body" .data.initialized "setup-status responds"

          echo "=== 2. Get CSRF (unauth, sets session cookie) ==="
          body=$(curl -sk -c "$COOKIE_JAR" -b "$COOKIE_JAR" "$BASE/api/v1/auth/csrf")
          CSRF=$(echo "$body" | jq -r .data.csrfToken)
          [ -n "$CSRF" ] && [ "$CSRF" != "null" ] || { echo "FAIL: no CSRF token"; echo "$body"; exit 1; }
          echo "OK: csrf token acquired"

          echo "=== 3. Create admin via /setup ==="
          # As of v1.1.15 ZeroProof is single-admin and password-only —
          # /auth/setup takes just { password } and returns { user: { id } }.
          body=$(curl -sk -c "$COOKIE_JAR" -b "$COOKIE_JAR" \
            -X POST "$BASE/api/v1/auth/setup" \
            -H "Content-Type: application/json" \
            -H "X-CSRF-Token: $CSRF" \
            -d "{\"password\":\"$PASSWORD\"}")
          assert_field "$body" .data.user.id "admin created"

          echo "=== 4. Re-acquire CSRF post-setup (session rotated) ==="
          body=$(curl -sk -c "$COOKIE_JAR" -b "$COOKIE_JAR" "$BASE/api/v1/auth/csrf")
          CSRF=$(echo "$body" | jq -r .data.csrfToken)
          [ -n "$CSRF" ] && [ "$CSRF" != "null" ] || { echo "FAIL: no post-setup CSRF"; exit 1; }

          echo "=== 5. /auth/me confirms session is authenticated ==="
          body=$(curl -sk -b "$COOKIE_JAR" "$BASE/api/v1/auth/me")
          assert_field "$body" .data.user.id "authenticated as user"

          echo "=== 6. /system/update returns dual-version + applyEnabled ==="
          body=$(curl -sk -b "$COOKIE_JAR" "$BASE/api/v1/system/update")
          assert_field "$body" .data.current "system update has current version"
          assert_field "$body" .data.versions.backend "system update has backend version"
          # updater version may be null if sidecar isn't reachable, but the
          # field MUST exist (not undefined).
          if ! echo "$body" | jq -e 'has("data") and (.data | has("versions") and (.versions | has("updater")))' >/dev/null; then
            echo "FAIL: /system/update missing data.versions.updater field"
            echo "$body" | head -c 500
            exit 1
          fi
          echo "OK: /system/update has versions.updater field (value: $(echo "$body" | jq -r .data.versions.updater))"
          assert_field "$body" .data.applyEnabled "applyEnabled present"
          assert_field "$body" .data.channel "release channel reported"

          echo "=== 7. PUT /system/update/channel persists Beta selection ==="
          body=$(curl -sk -b "$COOKIE_JAR" \
            -X PUT "$BASE/api/v1/system/update/channel" \
            -H "Content-Type: application/json" \
            -H "X-CSRF-Token: $CSRF" \
            -d '{"channel":"beta"}')
          channel=$(echo "$body" | jq -r .data.channel)
          [ "$channel" = "beta" ] || { echo "FAIL: channel did not flip to beta, got: $channel"; echo "$body"; exit 1; }
          echo "OK: channel switched to beta"

          # Reset to stable so subsequent tests aren't sticky.
          curl -sk -b "$COOKIE_JAR" \
            -X PUT "$BASE/api/v1/system/update/channel" \
            -H "Content-Type: application/json" \
            -H "X-CSRF-Token: $CSRF" \
            -d '{"channel":"stable"}' >/dev/null

          echo "=== 8. /unifi/discover responds with candidates array ==="
          body=$(curl -sk -b "$COOKIE_JAR" "$BASE/api/v1/unifi/discover")
          if ! echo "$body" | jq -e '.data.candidates | type == "array"' >/dev/null; then
            echo "FAIL: /unifi/discover did not return candidates array"
            echo "$body" | head -c 500
            exit 1
          fi
          echo "OK: /unifi/discover returns candidates array"

          echo "=== 9. /dns-proxy/discover responds with candidates array ==="
          body=$(curl -sk -b "$COOKIE_JAR" "$BASE/api/v1/dns-proxy/discover")
          if ! echo "$body" | jq -e '.data.candidates | type == "array"' >/dev/null; then
            echo "FAIL: /dns-proxy/discover did not return candidates array"
            echo "$body" | head -c 500
            exit 1
          fi
          echo "OK: /dns-proxy/discover returns candidates array"

          echo "=== 10. /unifi/settings on a fresh install reports unconfigured ==="
          body=$(curl -sk -b "$COOKIE_JAR" "$BASE/api/v1/unifi/settings")
          configured=$(echo "$body" | jq -r .data.configured)
          [ "$configured" = "false" ] || { echo "FAIL: fresh install reports configured=$configured"; echo "$body"; exit 1; }
          echo "OK: /unifi/settings reports unconfigured"

          echo "=== 11. /dns-proxy/settings on a fresh install reports unconfigured ==="
          body=$(curl -sk -b "$COOKIE_JAR" "$BASE/api/v1/dns-proxy/settings")
          configured=$(echo "$body" | jq -r .data.configured)
          [ "$configured" = "false" ] || { echo "FAIL: fresh install reports configured=$configured"; echo "$body"; exit 1; }
          echo "OK: /dns-proxy/settings reports unconfigured"

          echo ""
          echo "All 11 critical-path API scenarios passed."

      - name: Setup Node for Playwright tests
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        # Don't pin a version here — root package.json's `packageManager`
        # field is the source of truth (pnpm@10.28.2). Specifying both
        # trips the action's "multiple versions" guard.
        uses: pnpm/action-setup@v4

      - name: Install frontend deps for Playwright
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install Playwright browser
        working-directory: ./frontend
        run: pnpm test:e2e:install

      - name: Tier 3 — Playwright UI tests against the live install
        working-directory: ./frontend
        env:
          PLAYWRIGHT_BASE_URL: https://localhost
          CI: 'true'
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  cross-version-upgrade:
    name: Cross-version upgrade (v(N-1) → PR HEAD)
    runs-on: ubuntu-latest
    timeout-minutes: 18

    # Tier 4 of the testing strategy. Install the latest released tag,
    # then run scripts/upgrade.sh to bring the worktree up to the PR's
    # HEAD. Verifies the upgrade path itself — the thing that bit us
    # repeatedly today (annotated-tag SHA dereference in #19, bootstrap
    # untracked-file handling in #19, env-merge openssl bug in #33).
    #
    # Runs in parallel with `fresh-install` so total wall-clock CI stays
    # under ~12 min even though both jobs do a full install + container
    # bringup.

    steps:
      - name: Checkout PR head with full tag history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need tags + history for upgrade.sh's plan

      - name: Determine baseline (latest released tag)
        id: baseline
        run: |
          set -e
          # Pick the latest semver release tag whose commit isn't HEAD.
          # On scheduled runs of main right after a release, the top tag
          # points at HEAD itself — fall through to the previous one so
          # "previous → current" stays meaningful instead of becoming a
          # no-op self-upgrade.
          head_sha=$(git rev-parse HEAD)
          tag=""
          for candidate in $(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname); do
            if [ "$(git rev-parse "$candidate^{commit}")" != "$head_sha" ]; then
              tag="$candidate"
              break
            fi
          done
          if [ -z "$tag" ]; then
            echo "No release tag ahead of HEAD — skipping cross-version test."
            echo "baseline=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Baseline tag: $tag"
          echo "baseline=$tag" >> "$GITHUB_OUTPUT"
          echo "pr_sha=$head_sha" >> "$GITHUB_OUTPUT"

      - name: Skip when no baseline tag exists
        if: steps.baseline.outputs.baseline == ''
        run: echo "Nothing to upgrade from — skipping cleanly."

      - name: Pre-flight prereqs
        if: steps.baseline.outputs.baseline != ''
        run: |
          for cmd in docker openssl curl jq; do
            command -v "$cmd" >/dev/null 2>&1 || { echo "MISSING: $cmd"; exit 1; }
          done
          docker compose version

      - name: Check out the baseline tag
        if: steps.baseline.outputs.baseline != ''
        run: |
          git checkout --detach "${{ steps.baseline.outputs.baseline }}"
          echo "Now at: $(git describe --tags --always)"

      - name: Run install.sh against the baseline
        if: steps.baseline.outputs.baseline != ''
        run: |
          set -e
          export SKIP_FIRMWARE_DOWNLOAD=true
          # Older install.sh variants are sometimes flaky on the trailing
          # health poll; do our own check below.
          yes | bash scripts/install.sh || true

      - name: Wait for the baseline stack to come up
        if: steps.baseline.outputs.baseline != ''
        run: |
          set -e
          deadline=$(( $(date +%s) + 180 ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            statuses=$(docker compose ps --format '{{.Names}}: {{.Status}}' || true)
            echo "$statuses"
            if echo "$statuses" | grep -E "zeroproof-backend.*healthy" >/dev/null; then
              echo "Baseline backend is healthy."
              break
            fi
            sleep 5
          done

      - name: Verify baseline /health
        if: steps.baseline.outputs.baseline != ''
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -sk -o /dev/null -w '%{http_code}' https://localhost/health || echo 000)
            echo "baseline /health attempt $i: $code"
            [ "$code" = "200" ] && exit 0
            sleep 3
          done
          echo "Baseline never became healthy."
          docker compose logs --tail=30
          exit 1

      - name: Capture baseline version (read from CHANGELOG)
        if: steps.baseline.outputs.baseline != ''
        id: baseline_version
        run: |
          baseline_v=$(grep -m1 -oE '## \[[0-9]+\.[0-9]+\.[0-9]+[^]]*\]' CHANGELOG.md | sed -E 's/## \[(.*)\]/v\1/')
          echo "baseline_version=$baseline_v" >> "$GITHUB_OUTPUT"
          echo "Baseline reports: $baseline_v"

      - name: Make the PR commit reachable for upgrade.sh
        if: steps.baseline.outputs.baseline != ''
        run: |
          # The baseline's `git fetch --tags` only knows about released
          # tags; it doesn't see this PR's HEAD. Fetch it explicitly so
          # `git checkout PR_SHA` inside upgrade.sh succeeds.
          git fetch origin "${{ steps.baseline.outputs.pr_sha }}" --no-tags

      - name: Run the baseline's upgrade.sh against the PR HEAD
        if: steps.baseline.outputs.baseline != ''
        run: |
          set -e
          # Note: this runs the BASELINE version's upgrade.sh (not the
          # PR's), targeting the PR commit. This mirrors the real user
          # flow: when an upgrade lands, the on-disk script is whatever
          # version they're already on. The PR's upgrade.sh changes get
          # tested in the *next* release's Tier 4 (when this PR's
          # version becomes the baseline).
          bash scripts/upgrade.sh "${{ steps.baseline.outputs.pr_sha }}"

      - name: Wait for the upgraded stack to come back
        if: steps.baseline.outputs.baseline != ''
        run: |
          set -e
          deadline=$(( $(date +%s) + 180 ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            statuses=$(docker compose ps --format '{{.Names}}: {{.Status}}' || true)
            echo "$statuses"
            if echo "$statuses" | grep -E "zeroproof-backend.*healthy" >/dev/null; then
              echo "Upgraded backend is healthy."
              break
            fi
            sleep 5
          done

      - name: Verify the upgrade landed on the PR commit
        if: steps.baseline.outputs.baseline != ''
        run: |
          set -e
          # Compare commit SHAs, not CHANGELOG versions — most PRs don't
          # bump CHANGELOG (only the release-stamp PRs do), so a "version
          # must move" check would false-positive on every feature PR.
          # The real signal is: did upgrade.sh leave the worktree on the
          # commit we asked for?
          current_sha=$(git rev-parse HEAD)
          target_sha="${{ steps.baseline.outputs.pr_sha }}"
          new_v=$(grep -m1 -oE '## \[[0-9]+\.[0-9]+\.[0-9]+[^]]*\]' CHANGELOG.md | sed -E 's/## \[(.*)\]/v\1/')
          echo "After upgrade — commit: $current_sha"
          echo "                version: $new_v"
          echo "Asked for:      commit: $target_sha"
          echo "Was on (commit): $(git rev-parse "${{ steps.baseline.outputs.baseline }}^{commit}")"
          if [ "$current_sha" != "$target_sha" ]; then
            echo "Worktree did not land on target commit — upgrade.sh failed silently or short-circuited."
            exit 1
          fi
          echo "Worktree is on the requested PR commit."

      - name: Verify upgraded /health still answers
        if: steps.baseline.outputs.baseline != ''
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -sk -o /dev/null -w '%{http_code}' https://localhost/health || echo 000)
            echo "upgraded /health attempt $i: $code"
            [ "$code" = "200" ] && break
            sleep 3
          done
          if [ "$code" != "200" ]; then
            echo "Upgrade made /health unreachable."
            docker compose logs --tail=30
            exit 1
          fi

      - name: Verify upgraded API proxy answers (setup-status)
        if: steps.baseline.outputs.baseline != ''
        run: |
          # /health proves nginx is up. setup-status proves the full
          # chain — public nginx → backend container → postgres → JSON.
          # The May 2026 LXC incident hit /health=200 while setup-status
          # returned 500 because backend lost its DB connection during
          # the postgres recreate. Catch that here.
          body=$(curl -sk https://localhost/api/v1/auth/setup-status)
          code=$(curl -sk -o /dev/null -w '%{http_code}' https://localhost/api/v1/auth/setup-status)
          echo "setup-status code=$code body=$body"
          if [ "$code" != "200" ]; then
            echo "Backend is reachable via nginx but DB chain is broken post-upgrade."
            docker compose logs --tail=40 backend postgres
            exit 1
          fi
          if ! echo "$body" | grep -q '"success":true'; then
            echo "setup-status returned 200 but payload is wrong:"
            echo "$body"
            exit 1
          fi

      - name: Verify upgraded SPA serves a real bundle
        if: steps.baseline.outputs.baseline != ''
        run: |
          # The May 2026 incident had the frontend container respond 200
          # with an index.html that had no <script src=...> reference.
          # Browsers loaded a blank page. Assert both: index.html mentions
          # a script bundle AND that bundle resolves 200.
          body=$(curl -sk https://localhost/)
          if echo "$body" | grep -qi "Welcome to nginx"; then
            echo "Public root is the nginx welcome page — frontend bundle missing."
            exit 1
          fi
          script_path=$(echo "$body" | grep -oE '<script[^>]+src="[^"]+"' | grep -oE 'src="[^"]+"' | head -1 | sed -E 's/src="([^"]+)"/\1/')
          if [ -z "$script_path" ]; then
            echo "index.html has no <script src=...> reference. First 2KB:"
            echo "$body" | head -c 2000
            exit 1
          fi
          echo "Bundle path: $script_path"
          bcode=$(curl -sk -o /dev/null -w '%{http_code}' "https://localhost${script_path}")
          if [ "$bcode" != "200" ]; then
            echo "Bundle path returned HTTP $bcode — SPA is broken."
            exit 1
          fi
          echo "SPA bundle served correctly ($script_path -> 200)."

      - name: Verify updater sidecar survived the upgrade (or restarted cleanly)
        if: steps.baseline.outputs.baseline != ''
        run: |
          status=$(docker inspect zeroproof-updater --format '{{.State.Status}} restartcount={{.RestartCount}}' || echo "missing")
          echo "Updater post-upgrade: $status"
          # If the sidecar is in restartcount=10+ territory it's the
          # crashloop pattern (UPDATER_SECRET missing on upgrade, etc).
          if echo "$status" | grep -qE 'restartcount=([1-9][0-9]+)'; then
            echo "Updater is crashlooping post-upgrade."
            docker logs zeroproof-updater --tail=30
            exit 1
          fi

      - name: Print full container state for debugging
        if: always() && steps.baseline.outputs.baseline != ''
        run: |
          docker compose ps || true
          docker compose logs --tail=50 || true

  worktree-drift:
    name: upgrade.sh handles dirty worktree
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Unit-style test of the dirty-tracked-file preflight added after
    # the May-2026 incident where a SCP'd hot-patch to scripts/upgrade.sh
    # left the worktree dirty, and `git checkout <tag>` bailed with a
    # raw stderr dump. Three scenarios:
    #   1. Local edit matches target byte-for-byte → auto-discard.
    #   2. Local edit genuinely differs → refuse with exit 2 + named file.
    #   3. Same as (2) but with --force-clean → succeed.
    # All three run against the PR's upgrade.sh (copied over the baseline
    # tag's copy) in --check mode so we never reach docker compose.

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Pick a baseline tag and a file that differs from HEAD
        id: pick
        run: |
          # Pick the latest semver release tag whose commit isn't HEAD.
          # On scheduled runs of main right after a release, the top tag
          # is HEAD — fall through to the previous one so we still have a
          # real diff to drive the dirty-worktree scenarios.
          head_sha=$(git rev-parse HEAD)
          baseline=""
          for candidate in $(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname); do
            if [ "$(git rev-parse "$candidate^{commit}")" != "$head_sha" ]; then
              baseline="$candidate"
              break
            fi
          done
          if [ -z "$baseline" ]; then
            echo "No release tag ahead of HEAD — skipping (first release of repo)."
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Prefer a small, predictable file. CHANGELOG.md always differs
          # between releases.
          file="CHANGELOG.md"
          git diff --name-only "$baseline"..HEAD -- "$file" | grep -q "$file" \
            || file=$(git diff --name-only "$baseline"..HEAD | head -n 1)
          if [ -z "$file" ]; then
            echo "No file-level changes from baseline — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "baseline=$baseline" >> "$GITHUB_OUTPUT"
          echo "file=$file" >> "$GITHUB_OUTPUT"
          echo "head=$head_sha" >> "$GITHUB_OUTPUT"
          echo "Will test against baseline=$baseline, file=$file"

      - name: Stage baseline worktree with PR's upgrade.sh
        if: steps.pick.outputs.skip != 'true'
        run: |
          # The PR's NEW upgrade.sh is the code under test. Copy it aside,
          # check out baseline, swap PR's upgrade.sh back in. This matches
          # how the hardening will reach users: through *this* release's
          # upgrade.sh, run by the *previous* release's worktree state.
          cp scripts/upgrade.sh /tmp/upgrade.sh.pr
          git checkout --detach "${{ steps.pick.outputs.baseline }}"
          cp /tmp/upgrade.sh.pr scripts/upgrade.sh
          # Help upgrade.sh resolve the PR SHA without a network hop.
          git fetch --no-tags origin "${{ steps.pick.outputs.head }}" 2>/dev/null || true

      - name: Scenario 1 — refuse with named file on genuine local edit
        if: steps.pick.outputs.skip != 'true'
        run: |
          set +e
          echo "STRAY LOCAL EDIT — CI worktree-drift test" >> "${{ steps.pick.outputs.file }}"
          output=$(bash scripts/upgrade.sh --check "${{ steps.pick.outputs.head }}" 2>&1)
          code=$?
          echo "$output"
          if [ "$code" != "2" ]; then echo "FAIL: expected exit 2, got $code"; exit 1; fi
          grep -qF "${{ steps.pick.outputs.file }}" <<< "$output" \
            || { echo "FAIL: file not surfaced in refuse message"; exit 1; }
          grep -qF "force-clean" <<< "$output" \
            || { echo "FAIL: didn't mention --force-clean override"; exit 1; }
          echo "OK: dirty-file refuse path works"
          git checkout HEAD -- "${{ steps.pick.outputs.file }}"

      - name: Scenario 2 — --force-clean discards and continues
        if: steps.pick.outputs.skip != 'true'
        run: |
          set +e
          echo "STRAY LOCAL EDIT — CI worktree-drift test" >> "${{ steps.pick.outputs.file }}"
          output=$(bash scripts/upgrade.sh --check --force-clean "${{ steps.pick.outputs.head }}" 2>&1)
          code=$?
          echo "$output"
          if [ "$code" != "0" ]; then echo "FAIL: expected exit 0 with --force-clean, got $code"; exit 1; fi
          grep -qF "force-clean" <<< "$output" \
            || { echo "FAIL: didn't log force-clean discard"; exit 1; }
          echo "OK: --force-clean path works"
          git checkout HEAD -- "${{ steps.pick.outputs.file }}" 2>/dev/null || true

      - name: Scenario 3 — redundant local edit (matches target) auto-discarded
        if: steps.pick.outputs.skip != 'true'
        run: |
          set +e
          # Write target's bytes into the file at baseline — the local
          # "edit" is now exactly what target would install. This is the
          # SCP-hotfix shape the script was built for.
          git show "${{ steps.pick.outputs.head }}:${{ steps.pick.outputs.file }}" \
            > "${{ steps.pick.outputs.file }}"
          output=$(bash scripts/upgrade.sh --check "${{ steps.pick.outputs.head }}" 2>&1)
          code=$?
          echo "$output"
          if [ "$code" != "0" ]; then echo "FAIL: expected exit 0, got $code"; exit 1; fi
          grep -qE "(Would )?[Dd]iscard.*${{ steps.pick.outputs.file }}.*redundant" <<< "$output" \
            || { echo "FAIL: didn't recognize edit as redundant"; exit 1; }
          echo "OK: redundant-edit auto-discard works"

  orphan-cleanup:
    name: upgrade.sh removes orphan containers before compose up
    runs-on: ubuntu-latest
    timeout-minutes: 8

    # Reproduces the May-2026 LXC failure where a leftover container named
    # `zeroproof-mqtt` from an old compose project blocked every subsequent
    # `compose up` with "container name already in use". We seed a fake
    # foreign-project container with one of our hardcoded container_names
    # and assert that upgrade.sh removes it transparently and the upgrade
    # completes. Same shape as the cross-version-upgrade job, plus the
    # orphan seeding.

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Pick baseline tag + PR SHA
        id: baseline
        run: |
          # Pick the latest semver release tag whose commit isn't HEAD.
          # On scheduled runs of main right after a release, the top tag
          # is HEAD — fall through to the previous one so the upgrade
          # isn't a no-op self-upgrade that fails post-upgrade checks.
          head_sha=$(git rev-parse HEAD)
          tag=""
          for candidate in $(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname); do
            if [ "$(git rev-parse "$candidate^{commit}")" != "$head_sha" ]; then
              tag="$candidate"
              break
            fi
          done
          if [ -z "$tag" ]; then
            echo "No release tag ahead of HEAD — skipping."
            echo "baseline=" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "baseline=$tag" >> "$GITHUB_OUTPUT"
          echo "pr_sha=$head_sha" >> "$GITHUB_OUTPUT"

      - name: Pre-flight prereqs
        if: steps.baseline.outputs.baseline != ''
        run: |
          for cmd in docker openssl curl jq; do
            command -v "$cmd" >/dev/null 2>&1 || { echo "MISSING: $cmd"; exit 1; }
          done
          docker compose version

      - name: Install at baseline
        if: steps.baseline.outputs.baseline != ''
        run: |
          set -e
          git checkout --detach "${{ steps.baseline.outputs.baseline }}"
          export SKIP_FIRMWARE_DOWNLOAD=true
          yes | bash scripts/install.sh || true

      - name: Wait for baseline stack to be healthy
        if: steps.baseline.outputs.baseline != ''
        run: |
          set -e
          deadline=$(( $(date +%s) + 180 ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            if docker compose ps --format '{{.Names}}: {{.Status}}' | grep -qE "zeroproof-backend.*healthy"; then
              echo "Baseline healthy."; break
            fi
            sleep 5
          done

      - name: Seed an orphan container with our hardcoded name
        if: steps.baseline.outputs.baseline != ''
        run: |
          # Stop the real mqtt so we can grab the name, then create a fake
          # foreign-project container that holds it. This is the exact
          # state the LXC was in: a stopped zeroproof-mqtt owned by an
          # old `repo` compose project.
          docker stop zeroproof-mqtt >/dev/null
          docker rm zeroproof-mqtt >/dev/null
          docker create \
            --name zeroproof-mqtt \
            --label com.docker.compose.project=ci-foreign-project \
            --label com.docker.compose.service=mqtt \
            alpine:3 sh -c 'sleep 3600' >/dev/null
          docker inspect zeroproof-mqtt --format \
            'orphan in place — project={{index .Config.Labels "com.docker.compose.project"}}, status={{.State.Status}}'

      - name: Seed a hex-prefixed same-project leftover (Created state)
        if: steps.baseline.outputs.baseline != ''
        run: |
          # Reproduces the leftover state we hit four times on the LXC:
          # when docker can't use the target container_name because the
          # old container still holds it, it prepends 12 hex chars + an
          # underscore. v1.1.16's orphan-cleanup only nuked foreign-project
          # conflicts; same-project hex leftovers slipped through and
          # blocked future recreates. v1.1.20 closes that gap.
          leftover_name="abcdef012345_zeroproof-postgres"
          docker create \
            --name "$leftover_name" \
            --label com.docker.compose.project=zeroproof \
            --label com.docker.compose.service=postgres \
            alpine:3 sh -c 'echo created and never started' >/dev/null
          docker inspect "$leftover_name" --format \
            "hex leftover in place — name={{.Name}} state={{.State.Status}}"

      - name: Make PR SHA reachable for upgrade.sh
        if: steps.baseline.outputs.baseline != ''
        run: |
          git fetch origin "${{ steps.baseline.outputs.pr_sha }}" --no-tags

      - name: Swap in PR's upgrade.sh and run upgrade
        if: steps.baseline.outputs.baseline != ''
        run: |
          set -e
          # Same as worktree-drift: test the *new* upgrade.sh, not the
          # baseline's, since that's what users will run after this PR
          # lands as the previous release.
          git show "${{ steps.baseline.outputs.pr_sha }}:scripts/upgrade.sh" \
            > /tmp/upgrade.sh.pr
          cp /tmp/upgrade.sh.pr scripts/upgrade.sh
          # The PR's upgrade.sh may already exist as a dirty tracked file
          # relative to baseline — that itself exercises the redundant-edit
          # path. Use --force-clean to keep the test focused on orphan
          # cleanup rather than the dirty-file branch.
          output=$(bash scripts/upgrade.sh --force-clean "${{ steps.baseline.outputs.pr_sha }}" 2>&1)
          echo "$output"
          grep -qF "Removing orphan containers" <<< "$output" \
            || { echo "FAIL: didn't log foreign-project orphan removal"; exit 1; }
          grep -qF "zeroproof-mqtt" <<< "$output" \
            || { echo "FAIL: didn't name the orphaned container"; exit 1; }
          grep -qF "Removing hex-prefixed leftovers" <<< "$output" \
            || { echo "FAIL: didn't log hex-prefixed leftover removal"; exit 1; }
          grep -qF "abcdef012345_zeroproof-postgres" <<< "$output" \
            || { echo "FAIL: didn't name the hex-prefixed leftover"; exit 1; }

      - name: Verify orphan is gone and live mqtt is owned by zeroproof
        if: steps.baseline.outputs.baseline != ''
        run: |
          set -e
          proj=$(docker inspect zeroproof-mqtt --format '{{index .Config.Labels "com.docker.compose.project"}}')
          echo "Post-upgrade mqtt project label: $proj"
          [ "$proj" = "zeroproof" ] || { echo "FAIL: mqtt not owned by zeroproof"; exit 1; }
          if docker inspect abcdef012345_zeroproof-postgres >/dev/null 2>&1; then
            echo "FAIL: hex-prefixed leftover still exists"
            exit 1
          fi
          echo "Hex-prefixed leftover successfully removed."

      - name: Verify upgraded /health still answers
        if: steps.baseline.outputs.baseline != ''
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -sk -o /dev/null -w '%{http_code}' https://localhost/health || echo 000)
            echo "post-orphan-cleanup /health attempt $i: $code"
            [ "$code" = "200" ] && break
            sleep 3
          done
          if [ "$code" != "200" ]; then
            echo "Upgrade made /health unreachable."
            docker compose logs --tail=50
            exit 1
          fi

      - name: Verify upgraded API proxy + SPA bundle after orphan cleanup
        if: steps.baseline.outputs.baseline != ''
        run: |
          # Same deep-probe contract as cross-version-upgrade — /health
          # alone is insufficient. See note on that job for context.
          scode=$(curl -sk -o /dev/null -w '%{http_code}' https://localhost/api/v1/auth/setup-status)
          sbody=$(curl -sk https://localhost/api/v1/auth/setup-status)
          echo "setup-status code=$scode body=$sbody"
          if [ "$scode" != "200" ] || ! echo "$sbody" | grep -q '"success":true'; then
            echo "setup-status broken post-upgrade."
            docker compose logs --tail=40 backend postgres
            exit 1
          fi
          html=$(curl -sk https://localhost/)
          script_path=$(echo "$html" | grep -oE '<script[^>]+src="[^"]+"' | grep -oE 'src="[^"]+"' | head -1 | sed -E 's/src="([^"]+)"/\1/')
          if [ -z "$script_path" ]; then
            echo "index.html missing script tag post-upgrade. First 2KB:"
            echo "$html" | head -c 2000
            exit 1
          fi
          bcode=$(curl -sk -o /dev/null -w '%{http_code}' "https://localhost${script_path}")
          [ "$bcode" = "200" ] || { echo "Bundle $script_path returned $bcode"; exit 1; }
          echo "SPA + API both healthy after orphan cleanup."

      - name: Container state on failure
        if: failure() && steps.baseline.outputs.baseline != ''
        run: |
          docker ps -a || true
          docker compose logs --tail=80 || true

  # Tiny-cost in-container coverage. Every upgrade-path bug we hit on
  # 2026-05-25 only manifested when upgrade.sh ran INSIDE the updater
  # container (suicide self-recreate, host-path bind-mount mismatch,
  # WS-disconnect-during-installing). The other Tier 4 jobs invoke
  # upgrade.sh from the host shell, which doesn't exercise any of that.
  # We can't afford to spin a full stack inside docker-in-docker for
  # every PR, so this job pays only the cost of `apk add` + a 30-second
  # dry-run: spin an alpine container, mount the worktree at the SAME
  # absolute path on both sides (mirrors v1.1.21's mount layout), run
  # upgrade.sh --check, and assert the in-container detection log line
  # fires + --check stays read-only. Catches regressions in the
  # detection + recreate-target-enumeration logic without paying for a
  # real recreate.
  in-container-upgrade-check:
    name: upgrade.sh --check runs cleanly inside a container
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Pick a baseline tag to point --check at
        id: pick
        run: |
          tag=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
          if [ -z "$tag" ]; then
            echo "No release tags — skipping (first release of repo)."
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Run upgrade.sh --check inside an alpine container
        if: steps.pick.outputs.skip != 'true'
        run: |
          # Mount worktree at the SAME path on both sides so compose's
          # path resolution matches what the production updater sees
          # post-v1.1.21. Docker socket lets upgrade.sh's compose-detection
          # codepath actually find the binary; --check stays read-only.
          worktree="$(pwd)"
          set +e
          output=$(docker run --rm \
            -v "$worktree":"$worktree" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -w "$worktree" \
            alpine:3 sh -c "apk add --no-cache bash git docker-cli docker-cli-compose openssl curl jq >/tmp/apk.log 2>&1 || { echo 'apk add failed:'; cat /tmp/apk.log; exit 1; }; git config --global --add safe.directory '*'; bash scripts/upgrade.sh --check ${{ steps.pick.outputs.tag }}" 2>&1)
          rc=$?
          set -e
          echo "=== docker run output (rc=$rc) ==="
          echo "$output"
          echo "=== end output ==="
          # v1.1.19 in-container detection must fire — if this breaks,
          # in-app upgrades will self-suicide again.
          grep -qF "Detected in-container execution" <<< "$output" \
            || { echo "FAIL: in-container detection didn't fire (v1.1.19 regression)"; exit 1; }
          # v1.1.19 recreate-target list must enumerate services
          # without 'updater' — that's the entire point of the
          # suicide-skip.
          grep -qE "Recreate targets:.*backend" <<< "$output" \
            || { echo "FAIL: recreate targets list didn't include backend"; exit 1; }
          if grep -qE "Recreate targets:.* updater( |$)" <<< "$output"; then
            echo "FAIL: recreate targets list includes 'updater' — suicide-skip broken"
            exit 1
          fi
          # --check must remain read-only.
          grep -qF "no changes applied" <<< "$output" \
            || { echo "FAIL: --check didn't print its read-only marker"; exit 1; }
          echo "In-container --check passes all assertions."
