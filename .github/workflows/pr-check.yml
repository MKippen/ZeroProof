name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  # Quick checks for PRs
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages
        uses: wagoid/commitlint-github-action@v6

      - name: Check for large files
        run: |
          # Fail if any file larger than 10MB is added
          find . -type f -size +10M -not -path "./.git/*" | while read file; do
            echo "::error::File $file is larger than 10MB"
            exit 1
          done

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # Ensure all tests pass before merge
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [pr-validation]
    steps:
      - name: Check all tests
        run: echo "All PR checks passed!"
