# Mosquitto MQTT Broker Configuration

# Listeners
listener 1883
listener 9001
protocol websockets

# Authentication
allow_anonymous false
password_file /mosquitto/config/passwd

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_type subscribe
log_type unsubscribe
connection_messages true
log_timestamp true

# Message settings
# Increased to support topology validation payloads from ESP32 probes.
max_packet_size 16384
message_size_limit 16384

# Connection settings
max_connections -1
