<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- ZeroProof Stamp Orbit logo -->

  <!-- Thick solid orange outer ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#FEB800" stroke-width="9"/>

  <!-- Dark center -->
  <circle cx="100" cy="100" r="84" fill="#0f172a"/>

  <!-- Thin orbit track -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="#FEB800" stroke-width="1" opacity="0.2"/>

  <!-- 3 orbiting satellite dots -->
  <circle cx="100" cy="32" r="4.5" fill="#FEB800" opacity="0.7"/>
  <circle cx="159" cy="134" r="4.5" fill="#FEB800" opacity="0.7"/>
  <circle cx="41" cy="134" r="4.5" fill="#FEB800" opacity="0.7"/>

  <!-- Zero -->
  <ellipse cx="100" cy="100" rx="27" ry="36" fill="none" stroke="#FEB800" stroke-width="6" stroke-linecap="round"/>

  <!-- Slash -->
  <line x1="77" y1="130" x2="123" y2="70" stroke="#FEB800" stroke-width="6" stroke-linecap="round"/>
</svg>
