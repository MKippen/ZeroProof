id: repeating_threat
description: |
  UniFi's IDS surfaces individual threat events. On their own, they're noisy.
  This detector groups them by source IP and only fires when one source is
  responsible for many hits in the window — a much stronger signal of a
  sustained scan, brute-force, or compromised host.

  Tunables (env vars):
    - REPEATING_THRESHOLD_MED  (default 5)
    - REPEATING_THRESHOLD_HIGH (default 20)
severity:
  base: MEDIUM
  escalate_to: HIGH
  when:
    - "count:>=20"
remediation: |
  1. Pull the source IP's flow history for the window.
  2. If the source is internal, treat it like an `ioc_match` finding — isolate
     and inspect the device.
  3. If the source is external, confirm the firewall is actually blocking the
     attempts (look at the `action` field on the underlying flow events).
references:
  - https://attack.mitre.org/tactics/TA0043/
retention_days: 14
