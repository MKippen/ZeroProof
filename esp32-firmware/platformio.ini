; PlatformIO Project Configuration File
; ZeroProof - ESP32 Firmware

[platformio]
default_envs = esp32dev
test_dir = test

[env]
; Common settings for all environments
test_framework = unity
test_build_src = yes

[env:esp32dev]
platform = espressif32@6.4.0
board = esp32dev
framework = arduino
monitor_speed = 115200

; Library dependencies
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.0
    mathieucarbou/ESPAsyncWebServer @ ^3.0.0

; Build flags
build_flags =
    -DFIRMWARE_VERSION=\"3.1.0\"
    -DMQTT_MAX_PACKET_SIZE=8192
    -DASYNCWEBSERVER_REGEX

; Upload settings
upload_speed = 921600

; Monitor settings
monitor_filters = esp32_exception_decoder

; Partition scheme with OTA support
board_build.partitions = min_spiffs.csv

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0.0
    mathieucarbou/ESPAsyncWebServer @ ^3.0.0

build_flags =
    -DFIRMWARE_VERSION=\"3.1.0\"
    -DMQTT_MAX_PACKET_SIZE=8192

upload_speed = 921600

; Native testing environment (runs on host machine without hardware)
[env:native]
platform = native
build_flags =
    -DFIRMWARE_VERSION=\"3.1.0\"
    -DUNIT_TEST
    -std=gnu++17
test_ignore = test_embedded
